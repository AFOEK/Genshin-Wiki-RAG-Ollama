storage:
  primary_root: /mnt/ssd/genshin_rag
  secondary_root: $HOME/Documents/Genshin-Wiki-RAG-Ollama/rag

db_path: data/genshin_rag.db
faiss_path: data/faiss

ollama: 
  base_url: http://localhost:11434
  embedding_model: all-minilm:latest
  qa_model: llama3.2:3b
  qa_keep_alive: "10m"
  embed_keep_alive: "15s"

kaggle:
  embedding_model: mixebread-ai/mxbai-embed-large-v1 #"BAAI/bge-large-en-v1.5" "nomic-ai/nomic-embed-text-v1.5"
  dataset_slug: afoek88/genshin-rag-chunks  #Change this to your kaggle account
  kernel_slug: afoek88/genshin-rag-embeddings #Change this to your kaggle account
  batch_size: 128
  max_text_chars: 2400
  faiss:
    index_mode: hnsw
    metric: cosine
    hnsw_m: 64
    hnsw_ef_construction: 400
    hnsw_ef_search: 64

faiss:
  index_mode: flat_ip      # flat_ip | ivf_flat | hnsw
  metric: cosine           # cosine | ip | l2
  # IVF only
  nlist: 256
  nprobe: 16
  # HNSW only
  hnsw_m: 32
  hnsw_ef_construction: 200
  hnsw_ef_search: 64

pipeline:
  chunk_size: 600
  chunk_overlap: 150
  max_embed_chars: 450
  min_embed_chars: 100
  archive_raw: true

threading:
  embed_queue_size: 200
  embed_workers: 1
  embed_batch_size: 32
  document_queue_size: 120

filters:
  deny_url_regex: "(?i)(new-in-|beta|datamine|preload|unreleased|prototype|%2Fdev%2F|%2Finternal%2F|#comment|comment-page|#respond|#comments|\\.(jpg|jpeg|png|gif|webp|svg|mp4|webm|avi|mov|mkv|ogg|mp3|wav|pdf|zip|rar|7z|tar|gz)|%2FChange_History|%2FGallery|%2FMedia|/Change_History|/Gallery|/Media)"
  deny_text_regex: "(?i)(unreleased|upcoming|beta build|from beta|not yet released|future version|test server|datamined|subject to change|preload data|development version)"

logging:
  level: INFO
  file: rag/logs/pipeline.log

sources:
  - name: kqm_tcl
    kind: github
    tier: primary
    enabled: true
    weight: 0.85
    path: rag/data/repos/kqm_tcl
    skip_if_unchanged: true
    force_rescan: false

  - name: kqm_news
    kind: github
    tier: primary
    enabled: true
    weight: 0.75
    path: rag/data/repos/kqm_news

  - name: genshin_wiki
    kind: fandom_api
    tier: primary
    enabled: true
    weight: 0.95
    api: https://genshin-impact.fandom.com/api.php
    max_pages: null
    rate_limit_s: 3.0

  - name: honey
    kind: honey_html
    tier: supplementary
    enabled: true
    weight: 0.65
    base_url: https://gensh.honeyhunterworld.com
    seeds:
      - "https://gensh.honeyhunterworld.com/?lang=EN"
    max_pages: null
    rate_limit_s: 3.0

  - name: lunaris
    kind: lunaris_html
    tier: supplementary
    enabled: false
    weight: 0.60
    base_url: https://lunaris.moe/
    seeds:
      - "https://lunaris.moe/?lang=EN"
    max_pages: null
    rate_limit_s: 3.0

  - name: naoka
    kind: naoka_html
    tier: supplementary
    enabled: false
    weight: 0.55
    base_url: https://gi.nanoka.cc/
    seeds:
      - "https://gi.nanoka.cc/?lang=EN"
    max_pages: null
    rate_limit_s: 3.0

  - name: homdgcat
    kind: homdgcat_html
    tier: supplementary
    enabled: false
    weight: 0.25
    base_url: https://homdgcat.wiki
    max_pages: null
    rate_limit_s: 3.0

  - name: hakushin
    kind: hakushin_html
    tier: supplementary
    enabled: false
    weight: 0.45
    base_url: https://gi20.hakush.in
    max_pages: null
    rate_limit_s: 3.0
