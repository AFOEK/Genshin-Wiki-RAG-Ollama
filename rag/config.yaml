storage:
  primary_root: /mnt/ssd/genshin_rag
  secondary_root: $HOME/Documents/Genshin-Wiki-RAG-Ollama/rag

db_path: data/genshin_rag.db
faiss_path: data/faiss

ollama: 
  base_url: http://localhost:11434
  embedding_model: all-minilm:latest #snowflake-arctic-embed:xs
  qa_model: llama3.2:3b
  qa_keep_alive: "10m"
  timeout: 180
  embed_keep_alive: "15s"

llamacpp:
  base_url: http://localhost:8081
  embedding_url: http://localhost:8082
  embedding_model: /opt/models/all-minilm-l6-v2.gguf #snowflake-arctic-embed-xs.gguf
  qa_model: /opt/models/llama-3.2-3b-instruct.gguf
  timeout: 300
  n_gpu_layers: 99

fts5:
  batch_size: 500

retrieval:
  candidate_k: 85
  deep_candidate_multiplier: 5
  dedup_max_per_doc: 2

reranker:
  mode: feature        # none | feature | cross_encoder
  cross_encoder_top_n: 32
  cross_encoder_batch_size: 8
  max_pair_text_chars: 1200
  cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-6-v2

context_expansion:
  enabled: true
  before: 1
  after: 1
  max_total_chunks: 24
  direct_only: true

parent_child:
  enabled: true
  children_per_parent: 4
  max_parents: 6
  max_total_chunks: 24
  
runtime:
  embedding_provider: ollama  #ollama | llamacpp
  qa_provider: ollama         #ollama | llamacpp
  accelerator: auto           #auto | cpu | vulkan | opencl

kaggle:
  # e5-large-v2: 335M params, 1024-dim, strong retrieval quality
  # bge-large-en-v1.5: 335M params, 1024-dim, alternative
  # nomic-embed-text-v1.5: 137M params, 768-dim, faster, nearly as good
  # snowflake-arctic-embed-m: 110M params, 768-dim, retrieval specialist
  embedding_model: intfloat/e5-large-v2
  dataset_slug: afoek88/genshin-rag-chunks  #Change this to your kaggle account
  kernel_slug: afoek88/genshin-rag-embeddings #Change this to your kaggle account
  batch_size: 256
  max_text_chars: 1200
  use_fp16: true
  gpu_type: nvidiaTeslaT4    # nvidiaTeslaT4 | nvidiaTeslaP100
  faiss:
    index_mode: hnsw  # flat_ip | ivf_flat | hnsw
    metric: cosine          # cosine | ip | l2
    hnsw_m: 40
    hnsw_ef_construction: 300
    hnsw_ef_search: 40

    ivf_nlist: 2048
    ivf_nprobe: 64

faiss:
  index_mode: flat_ip      # flat_ip | ivf_flat | hnsw
  metric: cosine           # cosine | ip | l2
  # IVF only
  nlist: 256
  nprobe: 16
  # HNSW only
  hnsw_m: 32
  hnsw_ef_construction: 200
  hnsw_ef_search: 64

pipeline:
  chunk_size: 600
  chunk_overlap: 150
  max_embed_chars: 450
  min_embed_chars: 100
  archive_raw: true

threading:
  embed_queue_size: 200
  embed_workers: 1
  embed_batch_size: 32
  document_queue_size: 120

filters:
  deny_url_regex: "(new-in-|beta|datamine|preload|unreleased|prototype|%2Fdev%2F|%2Finternal%2F|#comment|comment-page|#respond|#comments|\\.(jpg|jpeg|png|gif|webp|svg|mp4|ico|webm|avi|mov|mkv|ogg|mp3|wav|woff|woff2|pdf|zip|rar|7z|tar|gz)|%2FChange_History|%2FGallery|%2FMedia|/Change_History|/Gallery|/Media)"
  deny_text_regex: "(unreleased|upcoming|beta build|from beta|not yet released|future version|test server|datamined|subject to change|preload data|development version)"

logging:
  level: INFO
  file: rag/logs/pipeline.log

sources:
  - name: kqm_tcl
    kind: github
    tier: primary
    enabled: true
    weight: 0.85
    path: rag/data/repos/kqm_tcl
    skip_if_unchanged: true
    force_rescan: false

  - name: kqm_news
    kind: github
    tier: primary
    enabled: true
    weight: 0.75
    path: rag/data/repos/kqm_news

  - name: genshin_wiki
    kind: fandom_api
    tier: primary
    enabled: true
    weight: 0.95
    api: https://genshin-impact.fandom.com/api.php
    max_pages: null
    rate_limit_s: 3.0

  - name: honey
    kind: honey_html
    tier: supplementary
    enabled: true
    weight: 0.65
    base_url: https://gensh.honeyhunterworld.com
    seeds:
      - "https://gensh.honeyhunterworld.com/?lang=EN"
    max_pages: null
    rate_limit_s: 3.0

  - name: game8
    kind: game8_html
    tier: supplementary
    enabled: true
    weight: 0.85
    base_url: https://game8.co/games/Genshin-Impact
    seeds:
      - "https://game8.co/games/Genshin-Impact/"
    allow_url_regex: "^https://game8\\.co/games/Genshin-Impact(?:/archives/\\d+)?/?$"
    deny_url_regex: "([?&]c_page=\\d+)"
    deny_text_regex: "(all message boards|list of message boards|co-op board|discussion board|friend requests|supporting cast|teapot designs|submissions:\\s*\\d+|post details)"
    max_pages: null
    rate_limit_s: 3.0

  - name: genshin_gg
    kind: genshingg_html
    tier: supplementary
    enabled: true
    weight: 0.75
    base_url: https://genshin.gg/
    seeds:
     - "https://genshin.gg/characters/"
     - "https://genshin.gg/builds/"
     - "https://genshin.gg/teams/"
     - "https://genshin.gg/tier-list/"
     - "https://genshin.gg/farming/"
     - "https://genshin.gg/weapons/"
     - "https://genshin.gg/artifacts/"
     - "https://genshin.gg/elements/"
    allow_url_regex: "^https://genshin\\.gg(?:/(?:characters?|weapons?|artifacts?|enemies|materials?|food|tcg|tier-list|codes|builds?|buffs?|ascension|resin|wishes?|banners?|events?|achievements?|domains?|bosses?|quests?)?(?:/[^/]*)?/?)?$"
    max_pages: null
    rate_limit_s: 3.0

  - name: lunaris
    kind: lunaris_html
    tier: supplementary
    enabled: false
    weight: 0.60
    base_url: https://lunaris.moe/
    seeds:
      - "https://lunaris.moe/?lang=EN"
    max_pages: null
    rate_limit_s: 3.0

  - name: naoka
    kind: naoka_html
    tier: supplementary
    enabled: false
    weight: 0.55
    base_url: https://gi.nanoka.cc/
    seeds:
      - "https://gi.nanoka.cc/?lang=EN"
    max_pages: null
    rate_limit_s: 3.0

  - name: homdgcat
    kind: homdgcat_html
    tier: supplementary
    enabled: false
    weight: 0.25
    base_url: https://homdgcat.wiki
    max_pages: null
    rate_limit_s: 3.0

  - name: hakushin
    kind: hakushin_html
    tier: supplementary
    enabled: false
    weight: 0.45
    base_url: https://gi20.hakush.in
    max_pages: null
    rate_limit_s: 3.0
