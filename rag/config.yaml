storage:
  primary_root: /mnt/ssd/genshin_rag
  secondary_root: $HOME/Documents/Genshin-Wiki-RAG-Ollama/rag

db_path: data/genshin_rag.db
faiss_path: data/faiss

ollama: 
  base_url: http://localhost:11434
  embedding_model: all-minilm:latest #snowflake-arctic-embed:xs
  qa_model: llama3.2:3b
  qa_keep_alive: "10m"
  timeout: 600
  embed_keep_alive: "15s"

llamacpp:
  base_url: http://localhost:8081
  embedding_url: http://localhost:8082
  embedding_model: /opt/models/all-minilm-l6-v2.gguf #snowflake-arctic-embed-xs.gguf
  qa_model: /opt/models/llama-3.2-3b-instruct.gguf
  timeout: 300
  n_gpu_layers: 99

fts5:
  batch_size: 500

retrieval:
  candidate_k: 85
  deep_candidate_multiplier: 5
  dedup_max_per_doc: 2

reranker:
  mode: feature        # none | feature | cross_encoder
  cross_encoder_top_n: 32
  cross_encoder_batch_size: 8
  max_pair_text_chars: 1200
  cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-6-v2

context_expansion:
  enabled: true
  before: 1
  after: 1
  max_total_chunks: 8
  direct_only: true

parent_child:
  enabled: true
  children_per_parent: 4
  max_parents: 4
  max_total_chunks: 8

versioning:
  current: 605
  aliases:
    luna 1: 600
    luna i: 600
    luna 2: 601
    luna ii: 601
    luna 3: 602
    luna iii: 602
    luna 4: 603
    luna iv: 603
    luna 5: 604
    luna v: 604
    luna 6: 605
    luna vi: 605
    luna 7: 606
    luna vii: 606
    luna 8: 607
    luna viii: 607
    luna 9: 608
    luna ix: 608
    luna 10: 609
    luna x: 609
  
runtime:
  embedding_provider: ollama   #ollama | llamacpp
  qa_provider: ollama          #ollama | llamacpp
  accelerator: auto            #auto | cpu | vulkan | opencl
  faiss_model_mismatch: error  # error | warn | ignore
  faiss_expected_model: kaggle # kaggle | runtime | ollama | llamacpp

kaggle:
  # intfloat/e5-large-v2: 335M params, 1024-dim, strong retrieval quality
  # BAAI/bge-large-en-v1.5: 335M params, 1024-dim, alternative
  # nomic-ai/nomic-embed-text-v1.5: 137M params, 768-dim, faster, nearly as good
  # Snowflake/snowflake-arctic-embed-m: 110M params, 768-dim, retrieval specialist
  # Snowflake/snowflake-arctic-embed-m-v2.0: 305M params, 768-dim, newer model from previous version
  # Snowflake/snowflake-arctic-embed-l-v2.0: 568M params, 1024-dim, bigger model
  # Octen/Octen-Embedding-0.6B: 600M params, 1024-dim, lightweight resource constrained device
  # Octen/Octen-Embedding-4B: 4B params, 2560-dim, balanced performance and efficiency
  # google/embeddinggemma-300m: 300M params, 768-dims
  embedding_model: intfloat/e5-large-v2
  dataset_slug: afoek88/genshin-rag-chunks    #Change this to your kaggle account
  kernel_slug: afoek88/genshin-rag-embeddings #Change this to your kaggle account
  batch_size: 256
  max_text_chars: 1200
  use_fp16: true
  gpu_type: nvidiaTeslaT4   # nvidiaTeslaT4 | nvidiaTeslaP100
  faiss:
    index_mode: ivf_sq      # flat_ip | ivf_flat | hnsw | ivf_sq
    metric: cosine          # cosine | ip | l2
    sq_type: sqfp16         # sq8 | sq6 | sq4 | sqfp16 | null

    hnsw_m: 64
    hnsw_ef_construction: 200
    hnsw_ef_search: 64

    ivf_nlist: 2048
    ivf_nprobe: 64

    train_size: 1550000
    batch_add: 2500

faiss:
  index_mode: flat_ip      # flat_ip | ivf_flat | hnsw | ivf_sqfp16
  metric: cosine           # cosine | ip | l2
  # IVF only
  nlist: 8192
  nprobe: 64
  # HNSW only
  hnsw_m: 32
  hnsw_ef_construction: 200
  hnsw_ef_search: 64

turbovec:
  path: data/turbovec
  bit_width: 4
  batch_size: 4096
  model_source: runtime   # runtime | kaggle | ollama | llamacpp
  model_mismatch: error   # error | warn | ignore

dataset_creation:
  db_path: null # null = resolve using storage.primary_root + db_path

  out_dir: data/training
  lora_out: genshin_{mode}_candidates.jsonl
  retrieval_pairs_out: genshin_retrieval_pairs.jsonl
  sft_negative_out: genshin_sft_negative_answerability.jsonl

  ollama_url: http://localhost:11434
  model: llama3.2:3b

  limit: 1000
  qa_per_chunk: 2
  min_chars: 500
  max_chars: 2500
  seed: 1137
  sleep: 0.5

  sources:
    - genshin_wiki
    - kqm_tcl
    - kqm_news
    - honey
    - genshin_gg
    - game8

  make_negatives: true
  hard_negatives: 3
  easy_negatives: 2
  negative_pool_size: 120
  negative_text_chars: 1200

peft:
  mode: lora    #lora | dora | vera | dvora | qlora | qdora | adalora | pvera | loha | lokr | bora | randlora | ia3 | oft | boft
  base_model: meta-llama/Llama-3.2-3B-Instruct
  output_dir: data/training/adapters/genshin_{mode}
  train_file: data/training/genshin_{mode}_train.jsonl
  val_file: data/training/genshin_{mode}_val.jsonl
  max_seq_length: 2048
  packing: false

  quantization:
    enabled: false    # auto-enabled for qlora / qdora
    load_in_4bit: true
    bnb_4bit_quant_type: nf4
    bnb_4bit_compute_dtype: bfloat16
    bnb_4bit_use_double_quant: true

  training:
    epochs: 25
    learning_rate: 0.0002
    batch_size: 16
    gradient_accumulation_steps: 8
    warmup_ratio: 0.03
    weight_decay: 0.0
    logging_steps: 10
    save_steps: 250
    eval_steps: 250
    save_total_limit: 2
    gradient_checkpointing: true
    fp16: false
    bf16: true

  target_modules:
    llama_mlp_attention:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj

  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    bias: none
    target_profile: llama_mlp_attention

  dora:
    r: 16
    alpha: 32
    dropout: 0.05
    bias: none
    target_profile: llama_mlp_attention

  vera:
    r: 256
    dropout: 0.05
    projection_prng_key: 0
    save_projection: true
    target_profile: llama_mlp_attention

  ia3:
    target_profile: llama_mlp_attention
    feedforward_modules:
      - gate_proj
      - up_proj
      - down_proj

  adalora:
    init_r: 12
    target_r: 8
    beta1: 0.85
    beta2: 0.85
    tinit: 200
    tfinal: 1000
    delta_t: 10
    alpha: 32
    dropout: 0.05
    target_profile: llama_mlp_attention

  dvora:
    r: 256
    alpha: 32
    eps: 1.0e-6
    seed: 1337
    target_profile: llama_mlp_attention
    init_b: 0.0
    init_d: 1.0
    save_adapter_only: true

dataset_split:
  enabled: true
  src: data/training/genshin_{mode}_candidates.jsonl
  train_out: data/training/genshin_{mode}_train.jsonl
  val_out: data/training/genshin_{mode}_val.jsonl
  val_ratio: 0.05
  seed: 1337

pipeline:
  chunk_size: 600
  chunk_overlap: 150
  max_embed_chars: 450
  min_embed_chars: 100
  archive_raw: true

threading:
  embed_queue_size: 200
  embed_workers: 1
  embed_batch_size: 32
  document_queue_size: 120

embedding_prompts:
  enabled: true
  profile: auto

  profiles:
    none:
      query_prefix: ""
      passage_prefix: ""
    
    e5:
      query_prefix: "query: "
      passage_prefix: "passage: "
    
    bge:
      query_prefix: "Represent this sentence for searching relevant passages: "
      passage_prefix: ""

    nomic:
      query_prefix: "search_query: "
      passage_prefix: "search_document: "

    snowflake:
      query_prefix: "Represent this sentence for searching relevant passages: "
      passage_prefix: ""

    embeddinggemma:
      query_prefix: "task: search result | query: "
      passage_prefix: "title: {title} | text: {text}"

    octen:
      query_prefix: "Instruct: Given a web search query, retrieve relevant passages that answer the query\nQuery: "
      passage_prefix: ""

    qwen3:
      query_prefix: "Instruct: Given a web search query, retrieve relevant passages that answer the query\nQuery: "
      passage_prefix: ""

filters:
  deny_url_regex: "(new-in-|beta|datamine|preload|unreleased|prototype|%2Fdev%2F|%2Finternal%2F|#comment|comment-page|#respond|#comments|\\.(jpg|jpeg|png|gif|webp|svg|mp4|ico|webm|avi|mov|mkv|ogg|mp3|wav|woff|woff2|pdf|zip|rar|7z|tar|gz)|%2FChange_History|%2FGallery|%2FMedia|/Change_History|/Gallery|/Media)"
  deny_text_regex: "(unreleased|upcoming|beta build|from beta|not yet released|future version|test server|datamined|subject to change|preload data|development version)"

logging:
  level: INFO
  file: rag/logs/pipeline.log

sources:
  - name: kqm_tcl
    kind: github
    tier: primary
    enabled: true
    weight: 0.85
    path: rag/data/repos/kqm_tcl
    skip_if_unchanged: true
    force_rescan: false

  - name: kqm_news
    kind: github
    tier: primary
    enabled: true
    weight: 0.75
    path: rag/data/repos/kqm_news

  - name: genshin_wiki
    kind: fandom_api
    tier: primary
    enabled: true
    weight: 0.95
    api: https://genshin-impact.fandom.com/api.php
    max_pages: null
    rate_limit_s: 3.0

  - name: honey
    kind: honey_html
    tier: supplementary
    enabled: true
    weight: 0.65
    base_url: https://gensh.honeyhunterworld.com
    seeds:
      - "https://gensh.honeyhunterworld.com/?lang=EN"
    max_pages: null
    rate_limit_s: 3.0

  - name: game8
    kind: game8_html
    tier: supplementary
    enabled: true
    weight: 0.85
    base_url: https://game8.co/games/Genshin-Impact
    seeds:
      - "https://game8.co/games/Genshin-Impact/"
    allow_url_regex: "^https://game8\\.co/games/Genshin-Impact(?:/?|/archives/\\d+/?)(?:[?#].*)?$"
    deny_url_regex: "([?&]c_page=\\d+|/archives/Players-Report|/comments|#comments|#comment|#respond|login|signin|signup|register|premium)"
    deny_text_regex: "(all message boards|list of message boards|co-op board|discussion board|friend requests|supporting cast|teapot designs|submissions:\\s*\\d+|post details)"
    max_pages: null
    rate_limit_s: 3.0

  - name: genshin_gg
    kind: genshingg_html
    tier: supplementary
    enabled: true
    weight: 0.75
    base_url: https://genshin.gg/
    seeds:
     - "https://genshin.gg/characters/"
     - "https://genshin.gg/builds/"
     - "https://genshin.gg/teams/"
     - "https://genshin.gg/tier-list/"
     - "https://genshin.gg/farming/"
     - "https://genshin.gg/weapons/"
     - "https://genshin.gg/artifacts/"
     - "https://genshin.gg/elements/"
    allow_url_regex: "^https://genshin\\.gg(?:/(?:characters?|weapons?|artifacts?|enemies|materials?|food|tcg|tier-list|codes|builds?|buffs?|ascension|resin|wishes?|banners?|events?|achievements?|domains?|bosses?|quests?)?(?:/[^/]*)?/?)?$"
    max_pages: null
    rate_limit_s: 3.0

  - name: lunaris
    kind: lunaris_html
    tier: supplementary
    enabled: false
    weight: 0.60
    base_url: https://lunaris.moe/
    seeds:
      - "https://lunaris.moe/?lang=EN"
    max_pages: null
    rate_limit_s: 3.0

  - name: naoka
    kind: naoka_html
    tier: supplementary
    enabled: false
    weight: 0.55
    base_url: https://gi.nanoka.cc/
    seeds:
      - "https://gi.nanoka.cc/?lang=EN"
    max_pages: null
    rate_limit_s: 3.0

  - name: homdgcat
    kind: homdgcat_html
    tier: supplementary
    enabled: false
    weight: 0.25
    base_url: https://homdgcat.wiki
    max_pages: null
    rate_limit_s: 3.0

  - name: hakushin
    kind: hakushin_html
    tier: supplementary
    enabled: false
    weight: 0.45
    base_url: https://gi20.hakush.in
    max_pages: null
    rate_limit_s: 3.0
